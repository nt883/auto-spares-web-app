<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&family=Montserrat&family=Oswald&family=Bebas+Neue&family=Exo+2&family=Rajdhani&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maitele Auto Spares</title>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header with navbar -->
    <header>
      <nav class="flex items-center justify-between bg-black text-white px-6 py-4">

    <!-- LEFT: Hamburger (ONLY on small screens) -->
    <button id="hamburger-btn" class="text-2xl md:hidden">
        &#9776;
    </button>

    <!-- CENTER: Logo -->
    <div class="flex items-center gap-3">
        <img src="images/logomaitele.png" class="w-10 h-10">
        <h1 class="font-bold">Maitele AutoSpares</h1>
    </div>

    <!-- RIGHT: Desktop Menu (ONLY on large screens) -->
    <ul class="hidden md:flex gap-8 text-lg">
        <li><a href="#" id="nav-home" class="hover:text-red-500">Home</a></li>
        <li><a href="#" id="nav-parts" class="hover:text-red-500">Car Parts</a></li>
        <li><a href="#" id="nav-contact" class="hover:text-red-500">Contact</a></li>
    </ul>

</nav>
    </header>
<aside id="sidebar"
class="fixed top-0 left-0 w-full h-full bg-black text-white transform -translate-x-full transition duration-300 z-50">

    <button class="text-3xl p-6" id="close-btn">&times;</button>

    <ul class="flex flex-col gap-6 p-10 text-2xl">
        <li><a href="#" id="nav-home" class="hover:text-red-500">Home</a></li>
        <li><a href="#" id="nav-parts" class="hover:text-red-500">Car Parts</a></li>
        <li><a href="#" id="nav-contact" class="hover:text-red-500">Contact Us</a></li>
    </ul>

</aside>

<main id="main-content">
<section id="home-section" class="text-center py-20 bg-gray-100">

    <h1 class="text-4xl font-bold mb-4">
        Quality Car Parts You Can Trust
    </h1>

    <p class="text-gray-600 mb-6">
        Affordable, reliable, and built for performance.
    </p>

    <button class="bg-black text-white px-6 py-3 rounded-lg hover:bg-red-500 transition">
        Shop Now
    </button>

</section>

    <!-- CAR PARTS -->
    <section id="parts-section" style="display:none;">
        <div class="parts-header">
    <h2>Car Parts</h2>
</div>

<div class="flex flex-wrap gap-4 justify-center my-6">

    <button class="bg-black text-white px-4 py-2 rounded-lg hover:bg-red-500 transition">Engine</button>
    <button class="bg-black text-white px-4 py-2 rounded-lg hover:bg-red-500 transition">Brakes</button>
    <button class="bg-black text-white px-4 py-2 rounded-lg hover:bg-red-500 transition">Suspension</button>
    <button class="bg-black text-white px-4 py-2 rounded-lg hover:bg-red-500 transition">Electrical</button>
    <button class="bg-black text-white px-4 py-2 rounded-lg hover:bg-red-500 transition">Body</button>

</div>



<div id="products-area" class="grid grid-cols-1 md:grid-cols-3 gap-6 p-6">

    <div class="bg-white p-4 rounded-xl shadow hover:shadow-xl transition">
        <h3 class="font-semibold">Brake Pads</h3>
        <p class="text-gray-500">R250</p>
        <button class="mt-3 bg-black text-white px-4 py-2 rounded-lg hover:bg-red-500 transition">
            Add to Cart
        </button>
    </div>

</div>
    </section>

    <!-- CONTACT -->
    <section id="contact-section" style="display:none;">
        <h2>Contact Us</h2>
        <p>Send us a request for the part you need.</p>
    </section>
    
    

</main>
    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Car Parts Store</p>
    </footer>

  <script src="js/script.js"></script>  

</body>
</html>
